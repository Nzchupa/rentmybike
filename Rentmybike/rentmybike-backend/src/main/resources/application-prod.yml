# ══════════════════════════════════════════════════════════════════════════════
# RentMyBike — Production Profile (Railway)
# RentMyBike — Produktionsprofil (Railway)
#
# Active when: SPRING_PROFILES_ACTIVE=prod
# Aktiv wenn: SPRING_PROFILES_ACTIVE=prod
#
# ALL sensitive values come from Railway environment variables.
# ALLE sensiblen Werte kommen aus Railway-Umgebungsvariablen.
# NEVER hardcode secrets here! / NIEMALS Geheimnisse hier hardcoden!
#
# Required Railway env vars / Erforderliche Railway-Umgebungsvariablen:
#   DATABASE_URL        — PostgreSQL connection URL (Railway provides this)
#   DB_USERNAME         — database username / Datenbankbenutzername
#   DB_PASSWORD         — database password / Datenbankpasswort
#   JWT_SECRET          — min 64 chars random string / mind. 64 Zeichen zufälliger String
#   CLOUDINARY_CLOUD_NAME
#   CLOUDINARY_API_KEY
#   CLOUDINARY_API_SECRET
#   SMTP_HOST           — e.g. smtp.resend.com or smtp.mailgun.org
#   SMTP_USERNAME
#   SMTP_PASSWORD
#   FRONTEND_URL        — e.g. https://rentmybike.vercel.app
#   COOKIE_DOMAIN        — shared parent domain for the CSRF cookie, e.g. rentmybike.xyz
#                          (NO leading dot — Tomcat's Rfc6265CookieProcessor rejects
#                          domain values starting with "." as invalid per RFC 6265)
#                          (frontend and backend are different subdomains of this)
# ══════════════════════════════════════════════════════════════════════════════

spring:
  # ── Railway PostgreSQL / Railway PostgreSQL ────────────────────────────────
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool tuned for Railway's free tier / Verbindungspool für Railway Free Tier optimiert
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── Production JPA — no SQL logging / Kein SQL-Logging in der Produktion ───
  jpa:
    show-sql: false

  # ── Production SMTP (Resend / Mailgun) / Produktions-SMTP ─────────────────
  # Port 587 (STARTTLS) is blocked by Railway's outbound network on some plans,
  # so we use port 465 (implicit SSL/TLS) instead — Resend supports both.
  # Port 587 (STARTTLS) wird auf manchen Railway-Plänen ausgehend blockiert,
  # daher nutzen wir Port 465 (implizites SSL/TLS) — Resend unterstützt beides.
  mail:
    host: ${SMTP_HOST}
    port: 465
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

# ══════════════════════════════════════════════════════════════════════════════
# Production Logging — errors only / Nur Fehler in der Produktion
# ══════════════════════════════════════════════════════════════════════════════
management:
  health:
    mail:
      enabled: false   # SMTP not needed for health check / SMTP nicht für Healthcheck benötigt

app:
  secure-cookie: true   # HTTPS only in production / Nur HTTPS in der Produktion
  # Shared parent domain so the frontend (rentmybike.xyz) can read the
  # XSRF-TOKEN cookie set by the backend (api.rentmybike.xyz) — without this
  # the cookie is host-only and invisible to the SPA, causing 403s on every
  # CSRF-protected request (e.g. logout). Defaults to "rentmybike.xyz" (NO
  # leading dot — Tomcat's Rfc6265CookieProcessor throws IllegalArgumentException
  # on every request for a domain starting with "."); per RFC 6265 a bare domain
  # already covers subdomains, so the dot was never needed. Can be overridden via
  # the COOKIE_DOMAIN Railway env var if the domain changes.
  # Gemeinsame übergeordnete Domain, damit das Frontend das vom Backend
  # gesetzte XSRF-TOKEN-Cookie lesen kann — sonst ist das Cookie Host-only
  # und für die SPA unsichtbar, was zu 403-Fehlern bei jeder CSRF-geschützten
  # Anfrage führt (z. B. Logout). OHNE führenden Punkt — Tomcat lehnt ihn ab.
  cookie-domain: ${COOKIE_DOMAIN:rentmybike.xyz}
  jwt:
    # No fallback here on purpose: if JWT_SECRET is not set in Railway, startup
    # MUST fail loudly instead of silently using the insecure default from
    # application.yml. Kein Fallback hier absichtlich: fehlt JWT_SECRET in
    # Railway, MUSS der Start laut fehlschlagen statt den unsicheren Standard
    # aus application.yml zu verwenden.
    secret: ${JWT_SECRET}

logging:
  level:
    root: WARN
    com.rentmybike: INFO
    org.springframework.security: WARN
